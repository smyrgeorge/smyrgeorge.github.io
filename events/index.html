<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>My Events</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width">
    <!-- Place favicon.ico and apple-touch-icon.png in the root directory -->
    <!-- build:css(.) styles/vendor.css -->
    <!-- bower:css -->
    <link rel="stylesheet" href="bower_components/bootstrap/dist/css/bootstrap.css" />
    <link rel="stylesheet" href="bower_components/angularjs-toaster/toaster.css" />
    <link rel="stylesheet" href="bower_components/angular-material/angular-material.css" />
    <link rel="stylesheet" href="bower_components/angular-material-icons/angular-material-icons.css" />
    <!-- endbower -->
    <!-- endbuild -->
    <!-- build:css(.tmp) styles/main.css -->
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/login.css">
    <link rel="stylesheet" href="styles/list.css">
    <link rel="stylesheet" href="styles/profile.css">
    <link rel="stylesheet" href="styles/angular.css">
    <link rel="stylesheet" href="styles/googlemaps.css">
    <!-- endbuild -->



  </head>
  <body ng-app="toDoListApp">

    <md-toolbar ng-controller="SidebarCtrl">
      <div class="md-toolbar-tools">
        <md-button class="md-icon-button" aria-label="Menu" ng-click="toggleLeft()">
          <md-icon md-svg-icon="img/menu.svg"></md-icon>
        </md-button>
        <h2>
          <span>Toolbar with Icon Buttons</span>
        </h2>
        <span flex></span>
        <md-button class="md-icon-button" aria-label="More">
          <md-icon md-svg-icon="img/more_vert.svg"></md-icon>
        </md-button>
      </div>
    </md-toolbar>

    <div ng-controller="SidebarCtrl" layout="column" style="height: auto;" ng-cloak>
      <md-sidenav class="md-sidenav-left md-whiteframe-z2" md-component-id="left">

        <!-- top section of sidebar -->
        <md-toolbar class="md-tall md-hue-2">
          <span flex></span>
          <div layout="column" class="md-toolbar-tools-bottom inset">
            <user-avatar></user-avatar>
            <span></span>
            <div>Firstname Lastname</div>
            <div>email@domainname.com</div>
          </div>
        </md-toolbar>
        <md-list ng-controller="MainCtrl">

          <md-list-item ng-repeat="item in menu">
              <md-item-content md-ink-ripple layout="row" layout-align="start center">
                <div class="inset">
                  <ng-md-icon icon="{{item.icon}}"></ng-md-icon>
                </div>
                <div class="inset">{{item.title}}
                </div>
              </md-item-content>
          </md-list-item>
          <md-divider></md-divider>

          <md-subheader>Management</md-subheader>

          <md-list-item ng-repeat="item in admin">
              <md-item-content md-ink-ripple layout="row" layout-align="start center">
                <div class="inset">
                  <ng-md-icon icon="{{item.icon}}"></ng-md-icon>
                </div>
                <div class="inset">{{item.title}}
                </div>
              </md-item-content>
          </md-list-item>
        </md-list>

        <md-content layout-padding ng-controller="LeftCtrl">

          <li><a href="#/" ng-click="close()">Home</a></li>
          <li><a ng-href="#/login" ng-click="close()">Log In</a></li>
          <li><a ng-href="#/list" ng-click="close()">List</a></li>
          <li><a ng-href="#/today" ng-click="close()">Today</a></li>
          <li><a ng-href="#/discover" ng-click="close()">Discover</a></li>

        </md-content>
      </md-sidenav>
    </div> <!-- close of sidebar div  -->


    <!--[if lte IE 8]>
      <p class="browsehappy">You are using an <strong>outdated</strong> browser. Please <a href="http://browsehappy.com/">upgrade your browser</a> to improve your experience.</p>
    <![endif]-->

    <!-- Toaster status: info, wait, error, success, warning -->
    <toaster-container toaster-options="{'time-out': 3000, 'close-button':true}"></toaster-container>


    <div class="header" ng-controller="MainCtrl">

      <md-content layout-fill flex layout-padding>
        <!-- Main Content -->
        <div class="container">
        <div ng-view=""></div>
        </div>

        <!-- Footer -->
        <md-divider>
          <p><span class="glyphicon glyphicon-heart"></span> smyrgeorge | 2016</p>
        </md-divider>
      </md-content>
    </div> <!-- close of header div  -->


    <!-- Google Analytics: change UA-XXXXX-X to be your site's ID -->
     <script>
      //  !function(A,n,g,u,l,a,r){A.GoogleAnalyticsObject=l,A[l]=A[l]||function(){

      //  r=n.getElementsByTagName(g)[0],a.src=u,r.parentNode.insertBefore(a,r)

      //  ga('send', 'pageview');

    <!-- build:js(.) scripts/vendor.js -->
    <!-- bower:js -->
    <script src="bower_components/jquery/dist/jquery.js"></script>
    <script src="bower_components/bootstrap/dist/js/bootstrap.js"></script>
    <script src="bower_components/angular/angular.js"></script>
    <script src="bower_components/angular-cookies/angular-cookies.js"></script>
    <script src="bower_components/angular-messages/angular-messages.js"></script>
    <script src="bower_components/angular-resource/angular-resource.js"></script>
    <script src="bower_components/angular-route/angular-route.js"></script>
    <script src="bower_components/angular-sanitize/angular-sanitize.js"></script>
    <script src="bower_components/firebase/firebase.js"></script>
    <script src="bower_components/angularfire/dist/angularfire.js"></script>
    <script src="bower_components/angular-animate/angular-animate.js"></script>
    <script src="bower_components/angularjs-toaster/toaster.js"></script>
    <script src="bower_components/angular-aria/angular-aria.js"></script>
    <script src="bower_components/angular-material/angular-material.js"></script>
    <script src="bower_components/angular-facebook/lib/angular-facebook.js"></script>
    <script src="bower_components/angularjs-geolocation/src/geolocation.js"></script>
    <script src="bower_components/angular-simple-logger/dist/angular-simple-logger.js"></script>
    <script src="bower_components/lodash/lodash.js"></script>
    <script src="bower_components/angular-google-maps/dist/angular-google-maps.js"></script>
    <script src="bower_components/angular-material-icons/angular-material-icons.min.js"></script>
    <!-- endbower -->
    <!-- endbuild -->

        <!-- build:js({.tmp,app}) scripts/scripts.js -->
        <script src="scripts/app.js"></script>

        <script src="scripts/controllers/main.js"></script>
        <script src="scripts/controllers/list.js"></script>
        <script src="scripts/controllers/login.js"></script>
        <script src="scripts/controllers/sync.js"></script>
        <script src="scripts/controllers/event.js"></script>
        <script src="scripts/controllers/today.js"></script>
        <script src="scripts/controllers/discover.js"></script>

        <script src="scripts/controllers/sidebar.js"></script>
        <script src="scripts/controllers/modal.js"></script>

        <script src="scripts/services/FacebookAuthenticationService.js"></script>
        <script src="scripts/services/FacebookUserEventsService.js"></script>

        <script src="scripts/services/FirebaseUserEventsService.js"></script>
        <script src="scripts/services/FirebaseEventsService.js"></script>
        <script src="scripts/services/FirebaseUserService.js"></script>

        <!-- endbuild -->


</body>
</html>
